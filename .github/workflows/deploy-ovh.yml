name: Deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate pages
        run: |
          python generate.py
          python generate-pages.py

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster129.hosting.ovh.net
          username: ${{ secrets.OVH_FTP_USER }}
          password: ${{ secrets.OVH_FTP_PASS }}
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
            .gitignore
            generate.py
            generate-pages.py
            generate-pages-NEW.py
            rewrite_generate_pages.py
            enrich_content.py
            enrich_period_content.py
            customize_widgets.py
            build-admin.py
            icons.py
            calcul.py
            template-brut-net.html
            template-net-brut.html
            tailwind.config.js
            package.json
            package-lock.json
            css/input.css
            submit-bing.sh

      - name: Submit to Bing IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "salairebrutonet.com",
              "key": "a7ebea6dfbd14ad6a3efe3c5fab40e46",
              "keyLocation": "https://salairebrutonet.com/a7ebea6dfbd14ad6a3efe3c5fab40e46.txt",
              "urlList": [
                "https://salairebrutonet.com/",
                "https://salairebrutonet.com/glossaire/",
                "https://salairebrutonet.com/a-propos/",
                "https://salairebrutonet.com/sitemap.xml"
              ]
            }'
